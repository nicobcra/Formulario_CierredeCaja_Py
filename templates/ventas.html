{% extends "base.html" %}

{% block head %}
<style>
  /* Estilos especificos del modulo de ventas */
  .ventas-wrap {
    max-width: 560px;
    margin: 0 auto;
    width: 100%;
  }

  /* En movil el page-body reduce padding para aprovechar pantalla */
  @media (max-width: 480px) {
    .page-body { padding: 12px; }
  }

  /* Card del formulario de ventas */
  .form-card {
    background: linear-gradient(160deg, #FFFFFF 0%, #F9FAFB 100%);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(255,255,255,0.9);
    overflow: hidden;
    margin-bottom: 16px;
    animation: slideUp 0.4s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .form-card-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--gris-100);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .form-card-header h3 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--gris-500);
  }

  .fecha-chip {
    font-size: 12px;
    font-weight: 500;
    color: var(--naranja-deep);
    background: var(--naranja-pale);
    border-radius: 99px;
    padding: 4px 12px;
  }

  .form-card-body { padding: 20px 24px; }

  /* Campo de fecha */
  .field-fecha { margin-bottom: 20px; }

  .field-fecha input[type="date"] {
    width: 100%;
    padding: 13px 16px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--gris-300);
    background: var(--blanco);
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 500;
    color: var(--gris-900);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .field-fecha input[type="date"]:focus {
    border-color: var(--naranja);
    box-shadow: 0 0 0 3px var(--naranja-glow);
  }

  /* Grid de campos monetarios 2x2 */
  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  /* 🔥 FIX SOLO MOVIL (sin tocar diseño) */
  @media (max-width: 480px) {
    .fields-grid {
      grid-template-columns: 1fr;
    }
  }

  /* Campo monetario individual */
  .money-field { display: flex; flex-direction: column; gap: 7px; }

  .money-field label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gris-500);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .money-field input {
    width: 100%;
    padding: 13px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--gris-300);
    background: var(--blanco);
    font-family: var(--font-body);
    font-size: 16px;
    font-weight: 500;
    color: var(--gris-900);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    -webkit-appearance: none;
  }

  .money-field input::placeholder { color: var(--gris-300); font-weight: 400; }

  .money-field input:focus {
    border-color: var(--naranja);
    box-shadow: 0 0 0 3px var(--naranja-glow);
    background: var(--naranja-pale);
  }

  .money-field input.error {
    border-color: #EF4444;
    background: #FEF2F2;
    animation: shake 0.3s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-4px); }
    75%      { transform: translateX(4px); }
  }

  .total-block {
    background: linear-gradient(135deg, #F97316 0%, #EA580C 100%);
    border-radius: var(--radius-sm);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    box-shadow: var(--shadow-btn);
  }

  .total-block .total-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
  }

  .total-block .total-amount {
    font-family: var(--font-display);
    font-size: clamp(24px, 6vw, 32px);
    color: var(--blanco);
    letter-spacing: -0.02em;
  }

  .historial-section {
    margin-top: 16px;
    animation: slideUp 0.45s 0.1s cubic-bezier(0.22,1,0.36,1) both;
  }

  .historial-header {
    padding: 0 4px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .historial-header h3 {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gris-500);
  }

  .historial-count {
    font-size: 11px;
    font-weight: 600;
    color: var(--naranja);
    background: var(--naranja-pale);
    border-radius: 99px;
    padding: 3px 10px;
  }

  .table-wrap {
    background: var(--blanco);
    border-radius: var(--radius);
    box-shadow: var(--shadow-card);
    border: 1px solid rgba(255,255,255,0.9);
    overflow: hidden;
  }

  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table { width: 100%; min-width: 480px; border-collapse: collapse; }

  thead tr { background: var(--gris-900); }

  thead th {
    padding: 12px 14px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #9CA3AF;
    text-align: right;
  }

  thead th:first-child { text-align: left; }

  tbody tr {
    border-bottom: 1px solid var(--gris-100);
    transition: background 0.15s;
  }

  tbody tr:last-child  { border-bottom: none; }
  tbody tr:hover       { background: var(--naranja-pale); }

  tbody td {
    padding: 13px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gris-700);
    text-align: right;
  }

  tbody td:first-child {
    text-align: left;
    font-weight: 600;
    color: var(--gris-900);
    font-size: 12px;
  }

  tbody td:last-child { font-weight: 700; color: var(--naranja-deep); }

  .empty-row td {
    text-align: center !important;
    color: var(--gris-300) !important;
    font-weight: 400 !important;
    font-size: 13px !important;
    padding: 32px !important;
  }
</style>
{% endblock %}
